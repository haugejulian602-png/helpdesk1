check = require_login()
if check:
    return check
<h1>{{ ticket.title }}</h1>
<p>{{ ticket.description }}</p>
<p>Status: {{ ticket.status }}</p>
<p>Opprettet: {{ ticket.created_at }}</p>

<form method="POST" action="/ticket/{{ ticket.id }}/status">
  <select name="status">
    <option {% if ticket.status == "Åpen" %}selected{% endif %}>Åpen</option>
    <option {% if ticket.status == "Pågår" %}selected{% endif %}>Pågår</option>
    <option {% if ticket.status == "Lukket" %}selected{% endif %}>Lukket</option>
  </select>
  <button type="submit">Endre status</button>
</form>

<form method="POST" action="/ticket/{{ ticket.id }}/delete">
  <button type="submit">Slett</button>
</form>

<a href="/">Tilbake</a>
